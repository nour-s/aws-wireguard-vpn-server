name: Destroy Singapore WireGuard

on:
  workflow_dispatch:

jobs:
  destroy-sg:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Terraform
        run: |
          curl -fsSL https://apt.releases.hashicorp.com/gpg | sudo apt-key add -
          sudo apt-add-repository "deb [arch=amd64] https://apt.releases.hashicorp.com $(lsb_release -cs) main"
          sudo apt update && sudo apt install -y terraform

      - name: Destroy Singapore
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-southeast-1
          SG_BUCKET: nours-wireguard-bucket-sg
        run: |
          # Create dummy tfvars so Terraform doesn't complain about missing vars
          cat > terraform/terraform.tfvars <<EOF
          aws_access_key = "$AWS_ACCESS_KEY_ID"
          aws_secret_key = "$AWS_SECRET_ACCESS_KEY"
          region         = "ap-southeast-1"
          email_address  = "dummy@dummy.com"
          EOF

          cd terraform
          terraform init -input=false \
            -backend-config="access_key=${AWS_ACCESS_KEY_ID}" \
            -backend-config="secret_key=${AWS_SECRET_ACCESS_KEY}" \
            -backend-config="region=ap-southeast-1" \
            -backend-config="bucket=${SG_BUCKET}" -reconfigure

          terraform destroy -input=false -auto-approve
          TF_EXIT=$?

          cd ..

          if [ $TF_EXIT -ne 0 ]; then
            echo "Terraform destroy failed — cleaning up resources directly"

            echo "Terminating EC2 instances"
            IDS=$(aws ec2 describe-instances --region ap-southeast-1 \
              --filters "Name=tag:Name,Values=wireguard" "Name=instance-state-name,Values=running,pending,stopped" \
              --query 'Reservations[].Instances[].InstanceId' --output text)
            if [ -n "$IDS" ]; then
              echo "Terminating: $IDS"
              aws ec2 terminate-instances --region ap-southeast-1 --instance-ids $IDS
            else
              echo "No instances found."
            fi

            echo "Releasing Elastic IPs"
            ALLOC_IDS=$(aws ec2 describe-addresses --region ap-southeast-1 \
              --filters "Name=tag:Name,Values=wireguard" \
              --query 'Addresses[].AllocationId' --output text)
            for ALLOC in $ALLOC_IDS; do
              echo "Releasing $ALLOC"
              aws ec2 release-address --region ap-southeast-1 --allocation-id $ALLOC
            done
          fi

          echo "Verifying all resources are gone before deleting state"
          REMAINING_INSTANCES=$(aws ec2 describe-instances --region ap-southeast-1 \
            --filters "Name=tag:Name,Values=wireguard" "Name=instance-state-name,Values=running,pending,stopped" \
            --query 'Reservations[].Instances[].InstanceId' --output text)
          REMAINING_EIPS=$(aws ec2 describe-addresses --region ap-southeast-1 \
            --filters "Name=tag:Name,Values=wireguard" \
            --query 'Addresses[].AllocationId' --output text)

          if [ -n "$REMAINING_INSTANCES" ] || [ -n "$REMAINING_EIPS" ]; then
            echo "ERROR: Resources still exist — keeping S3 bucket to preserve Terraform state"
            echo "Remaining instances: $REMAINING_INSTANCES"
            echo "Remaining EIPs: $REMAINING_EIPS"
            exit 1
          fi

          echo "All resources confirmed gone — deleting S3 bucket"
          aws s3 rm s3://$SG_BUCKET --recursive || true
          aws s3 rb s3://$SG_BUCKET || true

          echo "Cleaning up key pair"
          aws ec2 delete-key-pair --key-name wireguard --region ap-southeast-1 || true
