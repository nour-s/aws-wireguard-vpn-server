name: AWS Cost Check

on:
  workflow_dispatch:

jobs:
  cost:
    runs-on: ubuntu-latest
    steps:
      - name: Cost estimate
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          echo "=== EC2 Instances in $AWS_DEFAULT_REGION ==="
          INSTANCE=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=wireguard" "Name=instance-state-name,Values=running,stopped,pending" \
            --query 'Reservations[].Instances[].[InstanceId,InstanceType,State.Name,LaunchTime]' \
            --output text)

          echo "$INSTANCE"

          if [ -z "$INSTANCE" ]; then
            echo "No wireguard instances found."
            exit 0
          fi

          LAUNCH_TIME=$(echo "$INSTANCE" | awk '{print $4}')
          INSTANCE_TYPE=$(echo "$INSTANCE" | awk '{print $2}')

          # Calculate hours running
          LAUNCH_EPOCH=$(date -d "$LAUNCH_TIME" +%s)
          NOW_EPOCH=$(date +%s)
          HOURS=$(echo "scale=2; ($NOW_EPOCH - $LAUNCH_EPOCH) / 3600" | bc)

          # ap-south-1 (Mumbai) pricing
          # t3.micro: $0.0116/hr, t3.small: $0.0232/hr
          if [ "$INSTANCE_TYPE" = "t3.micro" ]; then RATE="0.0116"; fi
          if [ "$INSTANCE_TYPE" = "t3.small" ]; then RATE="0.0232"; fi
          RATE=${RATE:-"0.0116"}

          EC2_COST=$(echo "scale=4; $HOURS * $RATE" | bc)
          # 8GB gp2 EBS: $0.10/GB/month = $0.000137/GB/hr
          EBS_COST=$(echo "scale=4; $HOURS * 8 * 0.000137" | bc)
          # Elastic IP (attached = free, only charged when unattached)
          TOTAL=$(echo "scale=4; $EC2_COST + $EBS_COST" | bc)

          echo ""
          echo "=== Cost Estimate ==="
          echo "Instance type : $INSTANCE_TYPE"
          echo "Launch time   : $LAUNCH_TIME"
          echo "Hours running : $HOURS hrs"
          echo "EC2 cost      : \$$EC2_COST  (@ \$$RATE/hr)"
          echo "EBS cost      : \$$EBS_COST  (8GB gp2 @ \$0.10/GB-month)"
          echo "----------------------------"
          echo "Total estimate: \$$TOTAL USD"

          echo ""
          echo "=== Data Transfer (CloudWatch) ==="
          INSTANCE_ID=$(echo "$INSTANCE" | awk '{print $1}')
          START_TIME=$(echo "$INSTANCE" | awk '{print $4}')

          NET_OUT=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/EC2 \
            --metric-name NetworkOut \
            --dimensions Name=InstanceId,Value=$INSTANCE_ID \
            --start-time "$START_TIME" \
            --end-time "$(date -u +%Y-%m-%dT%H:%M:%S)" \
            --period 86400 \
            --statistics Sum \
            --query 'Datapoints[].Sum' \
            --output text 2>/dev/null)

          NET_IN=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/EC2 \
            --metric-name NetworkIn \
            --dimensions Name=InstanceId,Value=$INSTANCE_ID \
            --start-time "$START_TIME" \
            --end-time "$(date -u +%Y-%m-%dT%H:%M:%S)" \
            --period 86400 \
            --statistics Sum \
            --query 'Datapoints[].Sum' \
            --output text 2>/dev/null)

          if [ -n "$NET_OUT" ] && [ "$NET_OUT" != "None" ]; then
            NET_OUT_GB=$(echo "scale=3; $NET_OUT / 1073741824" | bc)
            NET_IN_GB=$(echo "scale=3; $NET_IN / 1073741824" | bc)
            # ap-south-1 data out: $0.109/GB (first 100GB/month free under free tier)
            TRAFFIC_COST=$(echo "scale=4; $NET_OUT_GB * 0.109" | bc)
            echo "Network In  : ${NET_IN_GB} GB (free)"
            echo "Network Out : ${NET_OUT_GB} GB"
            echo "Traffic cost: \$$TRAFFIC_COST  (@ \$0.109/GB out)"
          else
            echo "CloudWatch permission not available — see WireGuard stats from router instead"
          fi

          echo ""
          echo "=== S3 Bucket ==="
          aws s3 ls s3://nours-wireguard-bucket --recursive --human-readable --summarize 2>/dev/null || echo "Bucket not found or empty"
