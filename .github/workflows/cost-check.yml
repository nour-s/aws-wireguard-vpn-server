name: AWS Cost Check

on:
  workflow_dispatch:

jobs:
  cost:
    runs-on: ubuntu-latest
    steps:
      - name: Cost estimate (all terminated + running instances)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ap-south-1
        run: |
          calc_region() {
            local REGION=$1
            local RATE=$2
            local LABEL=$3

            echo "=== $LABEL ==="
            INSTANCES=$(aws ec2 describe-instances --region "$REGION" \
              --filters "Name=tag:Name,Values=wireguard" \
              --query 'Reservations[].Instances[].[InstanceId,InstanceType,State.Name,LaunchTime,StateTransitionReason]' \
              --output text 2>/dev/null)

            if [ -z "$INSTANCES" ]; then
              echo "No wireguard instances found in $REGION"
              return
            fi

            REGION_EC2_TOTAL=0
            REGION_EBS_TOTAL=0
            REGION_HOURS_TOTAL=0

            while IFS=$'\t' read -r ID TYPE STATE LAUNCH REASON; do
              LAUNCH_EPOCH=$(date -d "$LAUNCH" +%s 2>/dev/null) || continue

              if [ "$STATE" = "running" ] || [ "$STATE" = "pending" ]; then
                END_EPOCH=$(date +%s)
                END_LABEL="now"
              else
                TERM_TIME=$(echo "$REASON" | grep -oP '\d{4}-\d{2}-\d{2} \d{2}:\d{2}:\d{2}' | head -1)
                if [ -n "$TERM_TIME" ]; then
                  END_EPOCH=$(date -d "$TERM_TIME UTC" +%s 2>/dev/null || date +%s)
                  END_LABEL="$TERM_TIME"
                else
                  END_EPOCH=$(date +%s)
                  END_LABEL="unknown (using now)"
                fi
              fi

              HOURS=$(echo "scale=2; ($END_EPOCH - $LAUNCH_EPOCH) / 3600" | bc)
              EC2=$(echo "scale=4; $HOURS * $RATE" | bc)
              EBS=$(echo "scale=4; $HOURS * 8 * 0.000137" | bc)
              echo "  $ID  $TYPE  $STATE"
              echo "    Launch: $LAUNCH  →  End: $END_LABEL"
              echo "    Hours: ${HOURS}h  EC2: \$$EC2  EBS: \$$EBS"

              REGION_EC2_TOTAL=$(echo "scale=4; $REGION_EC2_TOTAL + $EC2" | bc)
              REGION_EBS_TOTAL=$(echo "scale=4; $REGION_EBS_TOTAL + $EBS" | bc)
              REGION_HOURS_TOTAL=$(echo "scale=2; $REGION_HOURS_TOTAL + $HOURS" | bc)
            done <<< "$INSTANCES"

            SUBTOTAL=$(echo "scale=4; $REGION_EC2_TOTAL + $REGION_EBS_TOTAL" | bc)
            echo ""
            echo "  $LABEL subtotal: ${REGION_HOURS_TOTAL}h  EC2=\$$REGION_EC2_TOTAL  EBS=\$$REGION_EBS_TOTAL  => \$$SUBTOTAL"
            echo ""
          }

          calc_region "ap-south-1"    "0.0116" "India (ap-south-1)"
          calc_region "ap-southeast-1" "0.0132" "Singapore (ap-southeast-1)"

          echo "=== Data Egress ==="
          echo "Known: ~19 GB out through India (game download dominated)"
          echo "Singapore egress: minimal (brief use, <0.5 GB estimated)"
          echo "India egress cost:  19 GB x \$0.109/GB = \$2.07"
          echo "Singapore egress:   0.5 GB x \$0.109   = \$0.05 (est)"
          echo "Total egress est:                         \$2.12"

          echo ""
          echo "=== S3 Buckets ==="
          aws s3 ls s3://nours-wireguard-bucket --recursive --human-readable --summarize 2>/dev/null || echo "nours-wireguard-bucket: not found (destroyed)"
          aws s3 ls s3://nours-wireguard-bucket-sg --recursive --human-readable --summarize 2>/dev/null || echo "nours-wireguard-bucket-sg: not found (destroyed)"
